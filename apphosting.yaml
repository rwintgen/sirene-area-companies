runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 1

env:
  - variable: CLOUD_SQL_CONNECTION_NAME
    value: project-95adcfa2-64d3-4f79-be3:europe-west4:public-data-maps-db
    availability:
      - RUNTIME

  - variable: DB_USER
    value: postgres
    availability:
      - RUNTIME

  - variable: DB_NAME
    value: postgres
    availability:
      - RUNTIME

  - variable: DB_PASSWORD
    secret: DB_PASSWORD
    availability:
      - RUNTIME

  - variable: GCP_PROJECT_ID
    value: project-95adcfa2-64d3-4f79-be3
    availability:
      - RUNTIME

  - variable: GCP_LOCATION
    value: europe-west4
    availability:
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: project-95adcfa2-64d3-4f79-be3.firebasestorage.app
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_ENTERPRISE_SEAT_MONTHLY
    value: price_1T9kW3LzMf4ig82JjqLoJsfh
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_ENTERPRISE_SEAT_YEARLY
    value: price_1T7eMeLzMf4ig82JoOMn2LnO
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_INDIVIDUAL_MONTHLY
    value: price_1T7eKiLzMf4ig82JMT6imrd3
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_INDIVIDUAL_YEARLY
    value: price_1T7eLCLzMf4ig82JWft7QeTg
    availability:
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
